spring.application.name=SmartHire
#Error Messages
Service.USER_ALREADY_EXISTS = "User with this email already exists."
Service.INVALID_CREDENTIALS = "Invalid Credentials."
Service.INVALID_PASSWORD = "Invalid password."
Service.USER_NOT_FOUND = "User not found from this id"

# Database properties
spring.datasource.url=jdbc:mysql://localhost:3306/smart_hire

spring.datasource.username=root

#If MySQL installation is password proctored,then use below property to set password
spring.datasource.password=root

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8765

# Resume Upload Directory
file.upload-dir=uploads/resumes

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.web.resources.static-locations=file:uploads/
