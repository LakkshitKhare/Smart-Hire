<div class="profile-page">

    <!-- HEADER -->
    <div class="profile-header">

        <div>
            <h2>My Profile</h2>
            <p>
                Manage your personal and professional details
            </p>
        </div>

        <button class="save-btn" (click)="onSubmit()">

            Save Profile

        </button>

    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card">

        <form [formGroup]="profileForm">

            <!-- BASIC INFO -->
            <div class="section">

                <h3>Basic Information</h3>

                <div class="form-row">

                    <div class="form-group">
                        <label>Full Name</label>

                        <input type="text" formControlName="fullName">
                    </div>

                    <div class="form-group">
                        <label>Email</label>

                        <input type="email" formControlName="email" readonly>
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Mobile</label>

                        <input type="text" formControlName="mobile">
                    </div>

                    <div class="form-group">
                        <label>Location</label>

                        <input type="text" formControlName="location">
                    </div>

                </div>

            </div>

            <!-- PROFESSIONAL -->
            <div class="section">

                <h3>Professional Information</h3>

                <div class="form-row">

                    <div class="form-group">
                        <label>LinkedIn URL</label>

                        <input type="url" formControlName="linkedinUrl">
                    </div>

                    <div class="form-group">
                        <label>GitHub URL</label>

                        <input type="url" formControlName="githubUrl">
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Skills</label>

                        <input type="text" formControlName="skills" placeholder="Java, Spring Boot, Angular">
                    </div>

                    <div class="form-group">
                        <label>Experience (Years)</label>

                        <input type="number" formControlName="experienceInYears">
                    </div>

                </div>

            </div>

            <!-- EDUCATION -->
            <div class="section">

                <h3>Education</h3>

                <div class="form-group">

                    <label>Education Details</label>

                    <textarea rows="6" formControlName="education">
                    </textarea>

                </div>

            </div>

        </form>

    </div>

</div>
