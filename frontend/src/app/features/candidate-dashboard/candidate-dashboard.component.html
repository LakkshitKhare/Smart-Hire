<div class="candidate-dashboard container">

	<h2>Candidate Dashboard</h2>

	<form class="candidate-form" [formGroup]="profileForm" (ngSubmit)="onSubmit()">

		<!-- BASIC PROFILE -->
		<section class="personal">

			<h3>Basic Information</h3>

			<div class="form-row">

				<div class="form-group">
					<label>Full Name</label>

					<input type="text" formControlName="fullName" placeholder="Enter full name" />
				</div>

				<div class="form-group">
					<label>Email</label>

					<input type="email" formControlName="email" placeholder="Enter email" />
				</div>

			</div>

			<div class="form-row">

				<div class="form-group">
					<label>Mobile</label>

					<input type="text" formControlName="mobile" placeholder="Enter mobile number" />
				</div>

				<div class="form-group">
					<label>Location</label>

					<input type="text" formControlName="location" placeholder="City, Country" />
				</div>

			</div>

			<div class="form-row">

				<div class="form-group">
					<label>LinkedIn URL</label>

					<input type="url" formControlName="linkedinUrl" placeholder="https://linkedin.com/in/username" />
				</div>

				<div class="form-group">
					<label>GitHub URL</label>

					<input type="url" formControlName="githubUrl" placeholder="https://github.com/username" />
				</div>

			</div>

			<div class="form-row">

				<div class="form-group">
					<label>Skills</label>

					<input type="text" formControlName="skills" placeholder="Java, Spring Boot, Angular" />
				</div>

				<div class="form-group">
					<label>Experience (Years)</label>

					<input type="number" formControlName="experienceInYears" placeholder="0" />
				</div>

			</div>

			<div class="form-group">
				<label>Resume</label>

				<input type="file" accept=".pdf,.doc,.docx" (change)="onFileSelected($event)" />
			</div>

		</section>

		<!-- EDUCATION -->
		<section class="education">

			<h3>Education</h3>

			<div class="form-group">
				<label>Education Details</label>

				<textarea rows="6" formControlName="education" placeholder="Enter education details">
                </textarea>
			</div>

		</section>

		<!-- BUTTON -->
		<div class="actions">

			<button type="submit" [disabled]="profileForm.invalid">

				Save Profile

			</button>

		</div>

	</form>

</div>
